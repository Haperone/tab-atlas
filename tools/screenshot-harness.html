<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1280, initial-scale=1.0">
  <title>Tab Atlas — Screenshot Harness</title>

  <!--
    Store-screenshot harness. Renders the REAL dashboard (../extension/app.js +
    ../extension/style.css) with a mocked chrome.* API and representative seed data,
    so 1280×800 store screenshots can be captured in any browser WITHOUT loading the
    unpacked extension or arranging live tabs.

    Usage: serve the repo root over http (e.g. `node tools/serve.mjs`) and open
    http://localhost:PORT/tools/screenshot-harness.html at a 1280×800 viewport, then
    screenshot. This file lives outside extension/ so it never ships in the store ZIP.
  -->
  <script>
    // ---- Seed data (representative, non-sensitive) ----
    const NOW = Date.now();
    const iso = (minsAgo) => new Date(NOW - minsAgo * 60000).toISOString();

    const SEED_TABS = [
      { id: 1,  windowId: 1, index: 0,  url: 'https://github.com/Haperone/tab-atlas',                 title: 'Haperone/tab-atlas: A calm new-tab dashboard' },
      { id: 2,  windowId: 1, index: 1,  url: 'https://github.com/Haperone/tab-atlas/issues/12',       title: 'Align independent column scrolling · Issue #12' },
      { id: 3,  windowId: 1, index: 2,  url: 'https://github.com/Haperone/tab-atlas/pull/15',         title: 'Redesign saved-links archive · Pull Request #15' },
      { id: 4,  windowId: 1, index: 3,  url: 'https://github.com/Haperone/tab-atlas',                 title: 'Haperone/tab-atlas: A calm new-tab dashboard' },
      { id: 5,  windowId: 1, index: 4,  url: 'https://www.youtube.com/watch?v=abc123',                title: 'Building a Chrome extension from scratch' },
      { id: 6,  windowId: 1, index: 5,  url: 'https://www.youtube.com/watch?v=def456',                title: 'CSS Grid in 20 minutes' },
      { id: 7,  windowId: 1, index: 6,  url: 'https://stackoverflow.com/questions/12345/manifest-v3', title: 'javascript - Manifest V3 service worker lifecycle' },
      { id: 8,  windowId: 1, index: 7,  url: 'https://stackoverflow.com/questions/67890/chrome-tabs',  title: 'How to query all tabs across windows' },
      { id: 9,  windowId: 1, index: 8,  url: 'https://developer.mozilla.org/en-US/docs/Web/API/Storage', title: 'Storage API - Web APIs | MDN' },
      { id: 10, windowId: 1, index: 9,  url: 'https://developer.mozilla.org/en-US/docs/Web/CSS/grid',  title: 'grid - CSS | MDN' },
      { id: 11, windowId: 1, index: 10, url: 'https://news.ycombinator.com/item?id=39000000',         title: 'Show HN: A calm new-tab dashboard for your tabs' },
      { id: 12, windowId: 1, index: 11, url: 'https://www.figma.com/file/xyz/Tab-Atlas',              title: 'Tab Atlas – Figma' },
      // Homepages (landing pages) — pulled into their own card
      { id: 13, windowId: 1, index: 12, url: 'https://mail.google.com/mail/u/0/#inbox',               title: 'Inbox (7) - you@gmail.com - Gmail' },
      { id: 14, windowId: 1, index: 13, url: 'https://x.com/home',                                    title: 'Home / X' },
      { id: 15, windowId: 1, index: 14, url: 'https://www.linkedin.com/',                             title: 'LinkedIn' },
    ];

    const SEED_STORE = {
      folders: [
        { id: 'f-read', name: 'Reading',  collapsed: false, color: '#78a8c8', createdAt: iso(4000) },
        { id: 'f-work', name: 'Work',     collapsed: false, color: '#73937a', createdAt: iso(3000) },
      ],
      deferred: [
        // Inbox (saved for later, no folder)
        { id: 'd1', url: 'https://arxiv.org/abs/2401.00001', title: 'Attention Is All You Need — revisited', savedAt: iso(120),  completed: false, dismissed: false, folderId: null },
        { id: 'd2', url: 'https://www.producthunt.com/',      title: 'Product Hunt – The best new products',   savedAt: iso(300),  completed: false, dismissed: false, folderId: null },
        // In "Reading"
        { id: 'd3', url: 'https://substack.com/inbox',        title: 'Weekly engineering digest',              savedAt: iso(600),  completed: false, dismissed: false, folderId: 'f-read' },
        { id: 'd4', url: 'https://www.wikipedia.org/',        title: 'Wikipedia, the free encyclopedia',       savedAt: iso(900),  completed: false, dismissed: false, folderId: 'f-read' },
        // In "Work"
        { id: 'd5', url: 'https://vercel.com/dashboard',      title: 'Vercel – Dashboard',                     savedAt: iso(1500), completed: false, dismissed: false, folderId: 'f-work' },
        // Archived (completed) — feeds the Archive launcher
        { id: 'd6', url: 'https://www.npmjs.com/package/x',   title: 'npm: an example package',                savedAt: iso(5000), completed: true,  dismissed: false, folderId: null, completedAt: iso(60) },
        { id: 'd7', url: 'https://news.ycombinator.com/',     title: 'Hacker News',                             savedAt: iso(6000), completed: true,  dismissed: false, folderId: null, completedAt: iso(200) },
      ],
      workspaceSnapshots: [],
    };

    // ---- Minimal chrome.* mock (only what the dashboard reads) ----
    const store = JSON.parse(JSON.stringify(SEED_STORE));
    const noopEvent = () => ({ addListener() {}, removeListener() {} });
    const resolve = (v) => Promise.resolve(v);

    window.chrome = {
      runtime: {
        id: 'screenshot-harness',
        // favIcon() builds a URL from this; the post-render patch below supplies
        // pretty letter-tile icons, so the exact value here doesn't matter.
        getURL: (path) => new URL(path, location.origin).toString(),
      },
      storage: {
        local: {
          get(keys) {
            const wanted = keys == null ? Object.keys(store)
              : Array.isArray(keys) ? keys
              : typeof keys === 'string' ? [keys]
              : Object.keys(keys);
            const out = {};
            for (const k of wanted) if (k in store) out[k] = store[k];
            return resolve(out);
          },
          set(obj) { Object.assign(store, JSON.parse(JSON.stringify(obj))); return resolve(); },
          remove(keys) { for (const k of [].concat(keys)) delete store[k]; return resolve(); },
        },
      },
      tabs: {
        query: (q = {}) => resolve(
          typeof q.groupId === 'number' ? [] : SEED_TABS.map(t => ({ ...t, groupId: -1, active: false, pinned: false }))
        ),
        get: (id) => resolve(SEED_TABS.find(t => t.id === id) || null),
        create: () => resolve({ id: 999 }),
        update: () => resolve({}),
        remove: () => resolve(),
        group: () => resolve(1),
        onCreated: noopEvent(), onRemoved: noopEvent(), onUpdated: noopEvent(),
        onActivated: noopEvent(), onReplaced: noopEvent(), onMoved: noopEvent(),
        onAttached: noopEvent(),
      },
      windows: {
        getCurrent: () => resolve({ id: 1 }),
        getAll: () => resolve([{ id: 1, focused: true, state: 'normal', tabs: SEED_TABS }]),
        update: () => resolve({}),
        create: () => resolve({ id: 2, tabs: [{ id: 1000 }] }),
      },
      // Provide tabGroups so the code path exists but no groups are shown.
      tabGroups: {
        query: () => resolve([]),
        get: () => resolve(null),
        update: () => resolve({}),
        onCreated: noopEvent(), onRemoved: noopEvent(), onUpdated: noopEvent(),
      },
    };

    // Clean, deterministic first paint. Pass ?theme=<id> to capture any palette.
    try {
      const validThemes = new Set([
        'default', 'graphite', 'solarized', 'tokyonight', 'mocha', 'monokai',
        'obsidian', 'auroraglass', 'smokeglass',
        'papersoft', 'lattesoft', 'pearlglass', 'paperglass',
      ]);
      const requestedTheme = new URLSearchParams(location.search).get('theme');
      const screenshotTheme = validThemes.has(requestedTheme) ? requestedTheme : 'paperglass';
      localStorage.setItem('tabout-onboarding-v1-complete', '1');
      localStorage.setItem('tabout-theme', screenshotTheme);
      localStorage.setItem('tabout-privacy', '0');
    } catch {}

    // ---- Pretty favicons: paint letter tiles onto the injected favicon <img>s ----
    // The real extension uses Chrome's local _favicon cache, unavailable here, so we
    // synthesize on-brand icons purely for the screenshot.
    const FAV_COLORS = ['#78a8c8', '#73937a', '#c8916e', '#9a8ac0', '#c96e72', '#6fae9e', '#c7a85a'];
    function faviconDataUri(domain) {
      const letter = (domain.replace(/^www\./, '')[0] || '?').toUpperCase();
      let hash = 0; for (const ch of domain) hash = (hash * 31 + ch.charCodeAt(0)) >>> 0;
      const bg = FAV_COLORS[hash % FAV_COLORS.length];
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"><rect width="16" height="16" rx="4" fill="${bg}"/><text x="8" y="12" font-family="system-ui,sans-serif" font-size="10" font-weight="700" text-anchor="middle" fill="#fff">${letter}</text></svg>`;
      return 'data:image/svg+xml;utf8,' + encodeURIComponent(svg);
    }
    function domainOf(el) {
      const host = el.closest('[data-tab-url]')?.dataset.tabUrl
        || el.closest('a[href]')?.getAttribute('href') || '';
      try { return new URL(host).hostname; } catch { return 'x'; }
    }
    function patchFavicons() {
      document.querySelectorAll('img.chip-favicon, .deferred-title img, .speed-tile-fav')
        .forEach(img => {
          if (img.dataset.patched) return;
          img.dataset.patched = '1';
          img.src = faviconDataUri(domainOf(img));
          img.style.display = '';
        });
    }
    new MutationObserver(patchFavicons).observe(document.documentElement, { childList: true, subtree: true });
    setInterval(patchFavicons, 400);
  </script>

  <script src="../extension/theme-init.js"></script>
  <link rel="stylesheet" href="../extension/style.css">
</head>
<body>
  <!-- The dashboard markup is created by app.js against these anchors, but the real
       page needs the full static skeleton. Rather than duplicate index.html here, we
       fetch it and inject its <body> before booting app.js. -->
  <script>
    (async () => {
      const html = await (await fetch('../extension/index.html')).text();
      const doc = new DOMParser().parseFromString(html, 'text/html');
      document.body.innerHTML = doc.body.innerHTML;
      const boot = document.createElement('script');
      boot.type = 'module';
      boot.src = '../extension/app.js';
      document.body.appendChild(boot);
    })();
  </script>
</body>
</html>
